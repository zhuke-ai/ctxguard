name: render-demo

on:
  push:
    paths:
      - 'demo.tape'
      - '.github/workflows/render-demo.yml'
  workflow_dispatch:    # manual trigger

permissions:
  contents: write

jobs:
  gif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ctxguard -> target

      - name: Build ctxguard
        run: cargo build --release --locked

      - name: Install vhs
        run: |
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.11.0/vhs_0.11.0_Linux_x86_64.tar.gz \
            | tar xz -C /usr/local/bin vhs

      - name: Install ffmpeg + chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser

      - name: Build demo session JSONL
        run: |
          mkdir -p /tmp
          python3 .github/demo_session.py /tmp/demo-session.jsonl

      - name: Render demo.gif
        env:
          VHS_BROWSER: chromium-browser
        run: vhs demo.tape

      - name: Verify GIF was produced
        run: |
          file demo.gif
          du -h demo.gif

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: demo.gif

      - name: Commit demo.gif back to repo
        run: |
          git config user.name "ctxguard-bot"
          git config user.email "bot@ctxguard.local"
          git add demo.gif
          git diff --cached --quiet || git commit -m "chore: regenerate demo.gif"
          git push
